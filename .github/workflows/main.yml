name: Publish to NPM
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ubaton'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build (if needed)
        run: npm run build --if-present
        
      - name: Run tests
        run: npm test --if-present

      - name: Verify NPM auth and scope access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing. Add a valid npm automation token in GitHub Actions secrets."
            exit 1
          fi

          echo "Validating npm authentication token..."
          if ! npm_user=$(npm whoami 2>/tmp/npm_whoami_err.log); then
            echo "NPM authentication failed (E401 Unauthorized)."
            echo "Update GitHub secret NPM_TOKEN with a valid npm Automation token from the account that can publish @ubaton packages."
            echo "Common causes: expired token, revoked token, or token from a different npm account."
            cat /tmp/npm_whoami_err.log
            exit 1
          fi

          echo "Authenticated as: $npm_user"
          npm access ls-packages "$npm_user" || true
          npm view @ubaton/filegen version || echo "Package may not exist yet; first publish still requires @ubaton scope publish permission."

      - name: Validate package metadata
        run: npm pkg get name version
        
      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
